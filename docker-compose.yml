services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: predix_market
      POSTGRES_USER: predix
      POSTGRES_PASSWORD: predix
    ports:
      - "5432:5432"
    volumes:
      - predix_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U predix -d predix_market"]
      interval: 5s
      timeout: 5s
      retries: 10

  predix-market-schema:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: predix_market
      DB_USER: predix
      DB_PASSWORD: predix
      SERVER_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  predix_pg_data:
